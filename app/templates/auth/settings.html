{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Settings</h1>

    <form method="POST" class="space-y-8">
        <div class="bg-white shadow rounded-lg p-6">
            <h2 class="text-lg font-medium text-gray-900 mb-4">Unit Preferences</h2>

            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                    <label for="distance_unit" class="block text-sm font-medium text-gray-700">Distance</label>
                    <select name="distance_unit" id="distance_unit"
                            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
                        <option value="km" {% if current_user.distance_unit == 'km' %}selected{% endif %}>Kilometers (km)</option>
                        <option value="mi" {% if current_user.distance_unit == 'mi' %}selected{% endif %}>Miles (mi)</option>
                    </select>
                </div>

                <div>
                    <label for="volume_unit" class="block text-sm font-medium text-gray-700">Volume</label>
                    <select name="volume_unit" id="volume_unit"
                            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
                        <option value="L" {% if current_user.volume_unit == 'L' %}selected{% endif %}>Liters (L)</option>
                        <option value="gal" {% if current_user.volume_unit == 'gal' %}selected{% endif %}>UK Gallons (gal)</option>
                        <option value="us_gal" {% if current_user.volume_unit == 'us_gal' %}selected{% endif %}>US Gallons (gal)</option>
                    </select>
                </div>

                <div>
                    <label for="consumption_unit" class="block text-sm font-medium text-gray-700">Consumption</label>
                    <select name="consumption_unit" id="consumption_unit"
                            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
                        <option value="L/100km" {% if current_user.consumption_unit == 'L/100km' %}selected{% endif %}>L/100km</option>
                        <option value="mpg" {% if current_user.consumption_unit == 'mpg' %}selected{% endif %}>MPG (UK)</option>
                        <option value="mpg_us" {% if current_user.consumption_unit == 'mpg_us' %}selected{% endif %}>MPG (US)</option>
                    </select>
                </div>

                <div>
                    <label for="currency" class="block text-sm font-medium text-gray-700">Currency</label>
                    <select name="currency" id="currency"
                            class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
                        <option value="USD" {% if current_user.currency == 'USD' %}selected{% endif %}>USD ($)</option>
                        <option value="EUR" {% if current_user.currency == 'EUR' %}selected{% endif %}>EUR (€)</option>
                        <option value="GBP" {% if current_user.currency == 'GBP' %}selected{% endif %}>GBP (£)</option>
                        <option value="AUD" {% if current_user.currency == 'AUD' %}selected{% endif %}>AUD ($)</option>
                        <option value="CAD" {% if current_user.currency == 'CAD' %}selected{% endif %}>CAD ($)</option>
                        <option value="INR" {% if current_user.currency == 'INR' %}selected{% endif %}>INR (₹)</option>
                        <option value="JPY" {% if current_user.currency == 'JPY' %}selected{% endif %}>JPY (¥)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-white shadow rounded-lg p-6">
            <h2 class="text-lg font-medium text-gray-900 mb-4">Change Password</h2>
            <p class="text-sm text-gray-500 mb-4">Leave blank to keep current password.</p>

            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                    <label for="new_password" class="block text-sm font-medium text-gray-700">New Password</label>
                    <input type="password" name="new_password" id="new_password"
                           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
                </div>

                <div>
                    <label for="confirm_new_password" class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                    <input type="password" name="confirm_new_password" id="confirm_new_password"
                           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
                </div>
            </div>
        </div>

        <div class="flex justify-end">
            <button type="submit"
                    class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                Save Settings
            </button>
        </div>
    </form>
</div>
{% endblock %}
